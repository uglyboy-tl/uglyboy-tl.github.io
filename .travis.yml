language: node_js
node_js:
  - "10"

cache:
  directories:
    - node_modules

branches:
  only:
    - hexo

before_install:
  - npm install -g hexo
  - git clone https://github.com/theme-next/hexo-theme-next themes/uglyboy

before_script:
  - cp -r themes/next/* themes/uglyboy/
  - git config --global user.name 'uglyboy-tl'
  - git config --global user.email 'uglyboy@aliyun.com'
  - git config --global url."https://uglyboy-tl:${passwd}@github.com/".insteadOf "https://github.com/"

install:
  - npm install

script:
  - hexo g

after_success:
  - hexo d
