language: node_js
node_js:
  - "10"

cache:
  directories:
    - node_modules

branches:
  only:
  - master

install:
  - npm install hexo -g
  - npm install
  - git clone https://github.com/theme-next/hexo-theme-next themes/uglyboy
  - cp -r themes/next/* themes/uglyboy/

script:
  - hexo cl
  - hexo g

branches:
  only:
    - hexo
